<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Trading Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d12;
      --surface:   #13131a;
      --border:    #1e1e2c;
      --border-hi: #2a2a3a;
      --text:      #e2e2eb;
      --muted:     #5a5a72;
      --green:     #22c55e;
      --green-dim: #166534;
      --red:       #ef4444;
      --red-dim:   #7f1d1d;
      --amber:     #f59e0b;
      --blue:      #60a5fa;
      --purple:    #a78bfa;
      --mono:      "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    header h1 span { color: var(--muted); font-weight: 400; }
    #last-updated {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Stats cards ─────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 24px 28px 0;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono);
    }
    .up   { color: var(--green); }
    .down { color: var(--red);   }
    .neu  { color: var(--text);  }

    /* ── Table section ───────────────────────────────────────── */
    .section {
      padding: 24px 28px 48px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .badge-open   { background: rgba(96,165,250,0.12); color: var(--blue); }
    .badge-closed { background: rgba(90,90,114,0.18);  color: var(--muted); }
    .badge-yes    { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge-no     { background: rgba(239,68,68,0.12);  color: var(--red); }
    .badge-tp     { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge-sl     { background: rgba(239,68,68,0.12);  color: var(--red); }
    .badge-exp    { background: rgba(90,90,114,0.18);  color: var(--muted); }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }
    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
    }
    th.num, td.num { text-align: right; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    td {
      padding: 11px 14px;
      font-size: 13px;
      vertical-align: middle;
    }
    td.num {
      font-family: var(--mono);
      font-size: 12px;
    }
    .question-cell {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .signal-cell {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }
    .score-bar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .score-pip {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-hi);
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 2px;
    }
    .pnl-row { font-family: var(--mono); font-size: 12px; font-weight: 600; }

    /* ── Filter tabs ─────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .filter-btn:hover  { border-color: var(--border-hi); color: var(--text); }
    .filter-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,0.08); }

    /* ── Threshold bars on open positions ───────────────────── */
    .progress-wrap {
      width: 64px;
      height: 4px;
      background: var(--border-hi);
      border-radius: 2px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>Geo Trading Agent <span>/ Dashboard</span></h1>
  <div id="last-updated"><span class="dot"></span>Loading…</div>
</header>

<div class="stats" id="stats-row"></div>

<div class="section">
  <div class="section-header">
    <span class="section-title">Positions</span>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="closed">Closed</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Market Question</th>
          <th>Signal Topic</th>
          <th>Score</th>
          <th>Out</th>
          <th>Status</th>
          <th class="num">Entry</th>
          <th class="num">Book / Close</th>
          <th class="num">Size $</th>
          <th class="num">P&L $</th>
          <th class="num">P&L %</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="positions-body"></tbody>
    </table>
  </div>
</div>

<script>
// ── Configuration ─────────────────────────────────────────────────────────────
// Set DATA_URL to your S3 positions.json URL after deploying the stack.
// The CDK output "DashboardUrl" prints this value after `cdk deploy`.
// Leave as null to use MOCK_DATA below (useful for local development).
const DATA_URL = "https://geotrading-geosignalsbucket7e438cb7-a5dv1umlybkt.s3.us-west-2.amazonaws.com/dashboard/positions.json";


// ── Helpers ───────────────────────────────────────────────────────────────────
// Active dataset — populated by init(), either from DATA_URL or MOCK_DATA
let POSITIONS = [];

function fmt$(n) {
  const sign = n >= 0 ? "+" : "";
  return sign + n.toFixed(2);
}
function fmtPct(n) {
  const sign = n >= 0 ? "+" : "";
  return sign + (n * 100).toFixed(1) + "%";
}
function fmtPrice(n) {
  return n != null ? n.toFixed(3) : "—";
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })
       + " " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}
function pnlClass(n) { return n > 0 ? "up" : n < 0 ? "down" : "neu"; }

function scoreColor(s) {
  const abs = Math.abs(s);
  return abs >= 0.9 ? "var(--green)" : abs >= 0.7 ? "var(--amber)" : "var(--muted)";
}

function closeReasonBadge(r) {
  if (!r) return "";
  const map = { take_profit: ["tp", "TP"], stop_loss: ["sl", "SL"], expired: ["exp", "EXP"] };
  const [cls, label] = map[r] || ["exp", r];
  return `<span class="badge badge-${cls}">${label}</span>`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────

function buildStats(positions) {
  const all = positions;
  const open = all.filter(p => p.status === "open");
  const closed = all.filter(p => p.status === "closed");

  const realizedPnl = closed.reduce((s, p) => s + (p.pnl_usd ?? 0), 0);
  const unrealizedPnl = open.reduce((s, p) => s + (p.pnl_usd ?? 0), 0);
  const netPnl = realizedPnl + unrealizedPnl;

  const winners = closed.filter(p => (p.pnl_usd ?? 0) > 0);
  const winRate = closed.length > 0 ? winners.length / closed.length : null;

  const deployed = open.reduce((s, p) => s + p.entry_price * p.size_shares, 0);

  const avgPnlPct = closed.length > 0
    ? closed.reduce((s, p) => {
        const pct = (((p.close_price ?? p.entry_price) - p.entry_price) / p.entry_price);
        return s + pct;
      }, 0) / closed.length
    : null;

  return [
    {
      label: "Net P&L",
      value: fmt$(netPnl),
      cls: pnlClass(netPnl),
      sub: `${fmt$(realizedPnl)} realized · ${fmt$(unrealizedPnl)} open`,
    },
    {
      label: "Open Positions",
      value: open.length,
      cls: "neu",
      sub: `${fmt$(unrealizedPnl)} unrealized`,
    },
    {
      label: "Win Rate",
      value: winRate != null ? Math.round(winRate * 100) + "%" : "—",
      cls: winRate != null ? (winRate >= 0.5 ? "up" : "down") : "neu",
      sub: `${winners.length} of ${closed.length} closed`,
    },
    {
      label: "Capital Deployed",
      value: "$" + deployed.toFixed(2),
      cls: "neu",
      sub: `across ${open.length} positions`,
    },
    {
      label: "Total Trades",
      value: all.length,
      cls: "neu",
      sub: avgPnlPct != null ? `avg ${fmtPct(avgPnlPct)} on closed` : "no closed trades",
    },
  ];
}

function renderStats(positions) {
  const stats = buildStats(positions);
  const el = document.getElementById("stats-row");
  el.innerHTML = stats.map(s => `
    <div class="card">
      <div class="card-label">${s.label}</div>
      <div class="card-value ${s.cls}">${s.value}</div>
      <div class="card-sub">${s.sub}</div>
    </div>
  `).join("");
}

// ── Table ─────────────────────────────────────────────────────────────────────

function renderTable(positions) {
  const tbody = document.getElementById("positions-body");
  if (!positions.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="empty">No positions yet — agent hasn't placed any trades.</td></tr>`;
    return;
  }

  tbody.innerHTML = positions.map(p => {
    const bookPrice = p.status === "open" ? p.current_price : p.close_price;
    const sizeUsdc = p.entry_price * p.size_shares;

    // P&L % — realised or live
    const pnlPct = p.status === "closed"
      ? ((p.close_price - p.entry_price) / p.entry_price)
      : ((p.current_price - p.entry_price) / p.entry_price);

    // For open positions: visual progress toward TP (50%) / SL (30%) thresholds
    const TP = 0.50; const SL = 0.30;
    let progressHtml = "";
    if (p.status === "open") {
      if (pnlPct >= 0) {
        const pct = Math.min(pnlPct / TP, 1);
        progressHtml = `
          <div class="progress-wrap" title="${fmtPct(pnlPct)} toward TP (${fmtPct(TP)})">
            <div class="progress-fill" style="width:${pct*100}%;background:var(--green)"></div>
          </div>`;
      } else {
        const pct = Math.min(Math.abs(pnlPct) / SL, 1);
        progressHtml = `
          <div class="progress-wrap" title="${fmtPct(pnlPct)} toward SL (${fmtPct(-SL)})">
            <div class="progress-fill" style="width:${pct*100}%;background:var(--red)"></div>
          </div>`;
      }
    }

    const scoreAbs = Math.abs(p.crowd_score);
    const scoreFillW = Math.round(scoreAbs * 100);
    const scoreFillColor = scoreColor(p.crowd_score);

    return `
      <tr>
        <td class="question-cell" title="${p.question}">${p.question}</td>
        <td class="signal-cell"   title="${p.source_headline}">${p.source_headline}</td>
        <td>
          <div class="score-bar">
            <div class="score-pip">
              <div class="score-fill" style="width:${scoreFillW}%;background:${scoreFillColor}"></div>
            </div>
            <span style="font-family:var(--mono);font-size:11px;color:${scoreFillColor}">${p.crowd_score.toFixed(2)}</span>
          </div>
        </td>
        <td><span class="badge badge-${p.outcome.toLowerCase()}">${p.outcome}</span></td>
        <td><span class="badge badge-${p.status}">${p.status.toUpperCase()}</span></td>
        <td class="num">${fmtPrice(p.entry_price)}</td>
        <td class="num">${fmtPrice(bookPrice)}</td>
        <td class="num">$${sizeUsdc.toFixed(2)}</td>
        <td class="num pnl-row ${pnlClass(p.pnl_usd ?? 0)}">${fmt$(p.pnl_usd ?? 0)}</td>
        <td class="num pnl-row ${pnlClass(pnlPct)}">${fmtPct(pnlPct)} ${progressHtml}</td>
        <td>${closeReasonBadge(p.close_reason)}</td>
      </tr>
    `;
  }).join("");
}

// ── Filter + Init ─────────────────────────────────────────────────────────────

let activeFilter = "all";

function applyFilter() {
  const filtered = activeFilter === "all"
    ? POSITIONS
    : POSITIONS.filter(p => p.status === activeFilter);
  renderTable(filtered);
}

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.filter;
  applyFilter();
});

async function init() {
  document.getElementById("last-updated").innerHTML =
    `<span class="dot"></span>Loading…`;

  try {
    POSITIONS = await fetch(DATA_URL).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
  } catch (err) {
    console.error("Failed to load positions:", err);
    POSITIONS = [];
  }

  renderStats(POSITIONS);
  applyFilter();

  const ts = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("last-updated").innerHTML =
    `<span class="dot"></span>live · ${ts}`;
}

init();
</script>
</body>
</html>
