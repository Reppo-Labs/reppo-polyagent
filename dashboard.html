<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Geo Trading Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d12;
      --surface:   #13131a;
      --border:    #1e1e2c;
      --border-hi: #2a2a3a;
      --text:      #e2e2eb;
      --muted:     #5a5a72;
      --green:     #22c55e;
      --green-dim: #166534;
      --red:       #ef4444;
      --red-dim:   #7f1d1d;
      --amber:     #f59e0b;
      --blue:      #60a5fa;
      --purple:    #a78bfa;
      --mono:      "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    header h1 span { color: var(--muted); font-weight: 400; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .wallet-link {
      font-family: var(--mono);
      font-size: 11px;
      color: #ffffff;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #8247E5;
      border-radius: 5px;
      background: linear-gradient(135deg, #8247E5 0%, #a78bfa 100%);
      box-shadow: 0 0 0 1px rgba(130, 71, 229, 0.2), 0 2px 8px rgba(130, 71, 229, 0.25);
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .wallet-link:hover {
      color: #ffffff;
      border-color: #a78bfa;
      box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.4), 0 2px 12px rgba(130, 71, 229, 0.5);
      transform: translateY(-1px);
    }
    .github-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      text-decoration: none;
      padding: 6px 10px;
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      background: var(--surface);
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .github-link:hover {
      color: #ffffff;
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.08);
      transform: translateY(-1px);
    }
    .github-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
    #last-updated {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Stats cards ─────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 24px 28px 0;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono);
    }
    .up   { color: var(--green); }
    .down { color: var(--red);   }
    .neu  { color: var(--text);  }

    /* ── Table section ───────────────────────────────────────── */
    .section {
      padding: 24px 28px 48px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .badge-open    { background: rgba(96,165,250,0.12); color: var(--blue); }
    .badge-pending { background: rgba(245,158,11,0.14); color: var(--amber); }
    .badge-closed  { background: rgba(90,90,114,0.18);  color: var(--muted); }
    .badge-unknown { background: rgba(90,90,114,0.18);  color: var(--muted); }
    .badge-yes    { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge-no     { background: rgba(239,68,68,0.12);  color: var(--red); }
    .badge-tp     { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge-sl     { background: rgba(239,68,68,0.12);  color: var(--red); }
    .badge-exp    { background: rgba(90,90,114,0.18);  color: var(--muted); }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }
    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
    }
    th.num, td.num { text-align: right; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    td {
      padding: 11px 14px;
      font-size: 13px;
      vertical-align: middle;
    }
    td.num {
      font-family: var(--mono);
      font-size: 12px;
    }
    .question-cell {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .question-cell a {
      color: inherit;
      text-decoration: none;
    }
    .question-cell a:hover {
      color: var(--blue);
      text-decoration: underline;
    }
    .tx-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
    }
    .tx-link:hover { color: var(--blue); }
    .signal-cell {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }
    .score-bar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .score-pip {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-hi);
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 2px;
    }
    .pnl-row { font-family: var(--mono); font-size: 12px; font-weight: 600; }

    /* ── Filter tabs ─────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .filter-btn:hover  { border-color: var(--border-hi); color: var(--text); }
    .filter-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,0.08); }

    /* ── Threshold bars on open positions ───────────────────── */
    .progress-wrap {
      width: 64px;
      height: 4px;
      background: var(--border-hi);
      border-radius: 2px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Load / error banner ─────────────────────────────────── */
    #dash-error {
      display: none;
      margin: 12px 28px 0;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--red-dim);
      background: rgba(239, 68, 68, 0.08);
      color: var(--red);
      font-size: 13px;
      line-height: 1.45;
    }
    #dash-error[data-visible="1"] { display: block; }
  </style>
</head>
<body>

<header>
  <h1>Geo Trading Agent <span>/ Dashboard</span></h1>
  <div class="header-right">
    <a class="wallet-link"
       href="https://polygonscan.com/address/0x644f75f0b1a0175E09e1ef14861ceDa2DFe3252A#tokentxns"
       target="_blank" rel="noopener"
       title="View on-chain pUSD / outcome-token transfers for the funder wallet">
      ↗ on-chain: 0x644f…3252A
    </a>
    <a class="github-link"
       href="https://github.com/Reppo-Labs/reppo-polyagent"
       target="_blank" rel="noopener"
       title="View source on GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>

</header>

<div id="dash-error" role="alert"></div>

<div class="stats" id="stats-row"></div>

<div class="section">
  <div class="section-header">
    <span class="section-title">Positions</span>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="closed">Closed</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Market Question</th>
          <th>Signal Topic</th>
          <th>Score</th>
          <th>Out</th>
          <th>Status</th>
          <th class="num">Entry</th>
          <th class="num">Mark / Close</th>
          <th class="num">Size $</th>
          <th class="num">P&L $</th>
          <th class="num">P&L %</th>
          <th>Result</th>
          <th>Tx</th>
        </tr>
      </thead>
      <tbody id="positions-body"></tbody>
    </table>
  </div>
</div>

<script>
// ── Configuration ─────────────────────────────────────────────────────────────
// Always load positions.json from the same folder as this page (same origin —
// avoids broken absolute URLs after bucket changes and works behind caching CDNs).
const DATA_URL = new URL("positions.json", location.href).href;

function showDashError(msg) {
  const el = document.getElementById("dash-error");
  el.textContent = msg;
  el.dataset.visible = "1";
}
function hideDashError() {
  const el = document.getElementById("dash-error");
  el.textContent = "";
  el.dataset.visible = "0";
}

// ── Helpers ───────────────────────────────────────────────────────────────────
// Active dataset — populated by init(), either from DATA_URL or MOCK_DATA
let POSITIONS = [];

// Coerce-to-number that tolerates strings (older snapshots stored numerics
// as strings) and returns null for anything non-finite.
function num(x) {
  if (x === null || x === undefined || x === "") return null;
  const v = typeof x === "number" ? x : Number(x);
  return Number.isFinite(v) ? v : null;
}
function fmt$(n) {
  const v = num(n);
  if (v === null) return "—";
  return (v >= 0 ? "+" : "") + v.toFixed(2);
}
function fmtPct(n) {
  const v = num(n);
  if (v === null) return "—";
  return (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";
}
function fmtPrice(n) {
  const v = num(n);
  return v !== null ? v.toFixed(3) : "—";
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })
       + " " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}
function pnlClass(n) { return n > 0 ? "up" : n < 0 ? "down" : "neu"; }

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function scoreColor(s) {
  const v = num(s);
  const abs = Math.abs(v ?? 0);
  return abs >= 0.9 ? "var(--green)" : abs >= 0.7 ? "var(--amber)" : "var(--muted)";
}

function closeReasonBadge(r) {
  if (!r) return "";
  const map = { take_profit: ["tp", "TP"], stop_loss: ["sl", "SL"], expired: ["exp", "EXP"] };
  const [cls, label] = map[r] || ["exp", r];
  return `<span class="badge badge-${cls}">${label}</span>`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────

// Prefer mid-priced unrealised P&L for display (matches how Polymarket UI
// marks open positions). The best-bid P&L (`pnl_usd`) remains authoritative
// for trading decisions inside the Lambda — that field is still shown in row
// tooltips so we can see exactly what SL/TP logic sees.
function rowPnl(p) {
  const status = p.status;
  if (status === "open" || status === "pending") {
    const mid = num(p.pnl_usd_mid);
    if (mid !== null) return mid;
  }
  return num(p.pnl_usd);
}

function rowMark(p) {
  if (p.status === "closed") return num(p.close_price);
  return num(p.mid_price) ?? num(p.current_price);
}

function buildStats(positions) {
  const all = positions;
  const open = all.filter(p => p.status === "open");
  const closed = all.filter(p => p.status === "closed");

  const realizedPnl   = closed.reduce((s, p) => s + (rowPnl(p) ?? 0), 0);
  const unrealizedPnl = open.reduce(  (s, p) => s + (rowPnl(p) ?? 0), 0);
  const netPnl = realizedPnl + unrealizedPnl;

  const winners = closed.filter(p => (rowPnl(p) ?? 0) > 0);
  const winRate = closed.length > 0 ? winners.length / closed.length : null;

  const deployed = open.reduce(
    (s, p) => s + (num(p.entry_price) ?? 0) * (num(p.size_shares) ?? 0),
    0,
  );

  const avgPnlPct = closed.length > 0
    ? closed.reduce((s, p) => {
        const entry = num(p.entry_price) ?? 0;
        const close = num(p.close_price) ?? entry;
        return s + (entry ? (close - entry) / entry : 0);
      }, 0) / closed.length
    : null;

  return [
    {
      label: "Net P&L",
      value: fmt$(netPnl),
      cls: pnlClass(netPnl),
      sub: `${fmt$(realizedPnl)} realized · ${fmt$(unrealizedPnl)} open (mid)`,
    },
    {
      label: "Open Positions",
      value: open.length,
      cls: "neu",
      sub: `${fmt$(unrealizedPnl)} unrealized (mid)`,
    },
    {
      label: "Win Rate",
      value: winRate != null ? Math.round(winRate * 100) + "%" : "—",
      cls: winRate != null ? (winRate >= 0.5 ? "up" : "down") : "neu",
      sub: `${winners.length} of ${closed.length} closed`,
    },
    {
      label: "Capital Deployed",
      value: "$" + (deployed || 0).toFixed(2),
      cls: "neu",
      sub: `across ${open.length} positions`,
    },
    {
      label: "Total Trades",
      value: all.length,
      cls: "neu",
      sub: avgPnlPct != null ? `avg ${fmtPct(avgPnlPct)} on closed` : "no closed trades",
    },
  ];
}

function renderStats(positions) {
  const stats = buildStats(positions);
  const el = document.getElementById("stats-row");
  el.innerHTML = stats.map(s => `
    <div class="card">
      <div class="card-label">${s.label}</div>
      <div class="card-value ${s.cls}">${s.value}</div>
      <div class="card-sub">${s.sub}</div>
    </div>
  `).join("");
}

// ── Table ─────────────────────────────────────────────────────────────────────

function renderTable(positions) {
  const tbody = document.getElementById("positions-body");
  if (!positions.length) {
    tbody.innerHTML = `<tr><td colspan="12" class="empty">No positions yet — agent hasn't placed any trades.</td></tr>`;
    return;
  }

  try {
    tbody.innerHTML = positions.map(p => {
      const entry    = num(p.entry_price);
      const size     = num(p.size_shares);
      const close    = num(p.close_price);
      const bid      = num(p.current_price);    // best bid — what SL/TP uses
      const mid      = num(p.mid_price);        // (bid+ask)/2 — display
      const pnlBid   = num(p.pnl_usd);
      const pnlMid   = num(p.pnl_usd_mid);
      const score    = num(p.crowd_score) ?? 0;

      // For display, prefer mid for open / pending positions; fall back to bid.
      const isOpen     = (p.status === "open" || p.status === "pending");
      const dispMark   = p.status === "closed" ? close : (mid ?? bid);
      const dispPnlUsd = isOpen ? (pnlMid ?? pnlBid) : pnlBid;
      const sizeUsdc   = (entry !== null && size !== null) ? entry * size : null;

      // P&L % — realised on closed, mid-priced on open (with bid fallback).
      let pnlPct = null;
      if (p.status === "closed" && entry && close !== null) {
        pnlPct = (close - entry) / entry;
      } else if (isOpen && entry && dispMark !== null) {
        pnlPct = (dispMark - entry) / entry;
      }

      const markTooltip = isOpen && bid !== null && mid !== null && bid !== mid
        ? `mid ${mid.toFixed(3)} · bid ${bid.toFixed(3)}`
        : "";
      const pnlTooltip  = isOpen && pnlBid !== null && pnlMid !== null && pnlBid !== pnlMid
        ? `mid ${fmt$(pnlMid)} · bid ${fmt$(pnlBid)} (SL/TP basis)`
        : "";

      // For open positions: visual progress toward TP (50%) / SL (30%) thresholds
      const TP = 0.50; const SL = 0.30;
      let progressHtml = "";
      if (p.status === "open" && pnlPct !== null) {
        if (pnlPct >= 0) {
          const pct = Math.min(pnlPct / TP, 1);
          progressHtml = `
          <div class="progress-wrap" title="${fmtPct(pnlPct)} toward TP (${fmtPct(TP)})">
            <div class="progress-fill" style="width:${pct*100}%;background:var(--green)"></div>
          </div>`;
        } else {
          const pct = Math.min(Math.abs(pnlPct) / SL, 1);
          progressHtml = `
          <div class="progress-wrap" title="${fmtPct(pnlPct)} toward SL (${fmtPct(-SL)})">
            <div class="progress-fill" style="width:${pct*100}%;background:var(--red)"></div>
          </div>`;
        }
      }

      const scoreFillW     = Math.round(Math.abs(score) * 100);
      const scoreFillColor = scoreColor(score);

      const slug = p.market_slug ? encodeURIComponent(String(p.market_slug)) : "";
      const encMarketId = p.market_id ? encodeURIComponent(String(p.market_id)) : "";
      const marketUrl = p.market_slug
        ? `https://polymarket.com/event/${slug}`
        : (encMarketId ? `https://polymarket.com/markets/${encMarketId}` : "https://polymarket.com/");

      const rawTx = p.tx_hash ? String(p.tx_hash).replace(/[^0-9a-fx]/gi, "") : "";
      const txHtml = rawTx
        ? `<a class="tx-link" href="https://polygonscan.com/tx/${rawTx}" target="_blank" rel="noopener" title="${escapeHtml(rawTx)}">↗ tx</a>`
        : "—";

      const outcome = (p.outcome || "—").toString();
      const status  = (p.status  || "—").toString();
      const ocAttr  = /^yes|no$/i.test(outcome) ? outcome.toLowerCase() : "unknown";
      const stAttr  = /^open|closed|pending$/i.test(status) ? status.toLowerCase() : "unknown";

      const q = escapeHtml(p.question || "—");
      const sig = escapeHtml(p.source_headline || "—");

      return `
      <tr>
        <td class="question-cell" title="${q}">
          <a href="${marketUrl}" target="_blank" rel="noopener">${q}</a>
        </td>
        <td class="signal-cell" title="${sig}">${sig}</td>
        <td>
          <div class="score-bar">
            <div class="score-pip">
              <div class="score-fill" style="width:${scoreFillW}%;background:${scoreFillColor}"></div>
            </div>
            <span style="font-family:var(--mono);font-size:11px;color:${scoreFillColor}">${score.toFixed(2)}</span>
          </div>
        </td>
        <td><span class="badge badge-${ocAttr}">${escapeHtml(outcome)}</span></td>
        <td><span class="badge badge-${stAttr}">${escapeHtml(status.toUpperCase())}</span></td>
        <td class="num">${fmtPrice(entry)}</td>
        <td class="num" title="${escapeHtml(markTooltip)}">${fmtPrice(dispMark)}</td>
        <td class="num">${sizeUsdc !== null ? "$" + sizeUsdc.toFixed(2) : "—"}</td>
        <td class="num pnl-row ${pnlClass(dispPnlUsd ?? 0)}" title="${escapeHtml(pnlTooltip)}">${fmt$(dispPnlUsd)}</td>
        <td class="num pnl-row ${pnlClass(pnlPct ?? 0)}">${fmtPct(pnlPct)} ${progressHtml}</td>
        <td>${closeReasonBadge(p.close_reason)}</td>
        <td>${txHtml}</td>
      </tr>
    `;
    }).join("");
    hideDashError();
  } catch (err) {
    console.error("renderTable:", err);
    showDashError(
      "The dashboard script hit an error while building the table (often fixed by a hard refresh: Ctrl+Shift+R or ⌘⇧R). " +
      "Details were logged to the browser console (F12)."
    );
    tbody.innerHTML = `<tr><td colspan="12" class="empty">Could not render rows — see red banner above.</td></tr>`;
  }
}

// ── Filter + Init ─────────────────────────────────────────────────────────────

let activeFilter = "all";

function applyFilter() {
  const filtered = activeFilter === "all"
    ? POSITIONS
    : POSITIONS.filter(p => p.status === activeFilter);
  renderTable(filtered);
}

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.filter;
  applyFilter();
});

async function init() {
  hideDashError();
  document.getElementById("last-updated").innerHTML =
    `<span class="dot"></span>Loading…`;

  try {
    const r = await fetch(DATA_URL, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    POSITIONS = Array.isArray(data) ? data : [];
  } catch (err) {
    console.error("Failed to load positions:", err);
    showDashError(
      `Could not load positions.json from this bucket (${err.message}). ` +
      "Check that the Lambda run completed and that your browser is not blocking the request. Try a hard refresh (⌘⇧R / Ctrl+Shift+R)."
    );
    POSITIONS = [];
  }

  try {
    renderStats(POSITIONS);
    applyFilter();
  } catch (err) {
    console.error(err);
    showDashError("Dashboard render failed — see browser console (F12).");
  }

  const ts = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("last-updated").innerHTML =
    `<span class="dot"></span>live · ${ts}`;
}

init();
</script>
</body>
